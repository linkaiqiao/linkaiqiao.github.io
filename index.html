<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表管理系统 - Class Schedule</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; padding: 60px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .logo { width: 120px; height: 120px; margin: 0 auto 30px; background: linear-gradient(135deg, #6200EE 0%, #7B1FA2 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; }
        h1 { text-align: center; color: #333; font-size: 32px; margin-bottom: 16px; }
        .tagline { text-align: center; color: #666; font-size: 16px; margin-bottom: 40px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .feature { text-align: center; padding: 24px; background: #f8f9fa; border-radius: 12px; }
        .feature h3 { color: #333; margin-bottom: 8px; }
        .feature p { color: #666; font-size: 14px; line-height: 1.6; }
        .download { text-align: center; padding: 30px; background: linear-gradient(135deg, #6200EE 0%, #7B1FA2 100%); border-radius: 12px; color: white; }
        .download h3 { margin-bottom: 10px; }
        .download p { opacity: 0.9; }
        .footer { text-align: center; margin-top: 40px; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📅</div>
        <h1>课程表管理系统</h1>
        <p class="tagline">高效管理您的课程安排，让学习更轻松</p>
        
        <div class="features">
            <div class="feature">
                <h3>📚 课程管理</h3>
                <p>轻松添加、编辑和删除课程，支持批量操作</p>
            </div>
            <div class="feature">
                <h3>⏰ 智能提醒</h3>
                <p>自定义上课提醒，不再错过任何课程</p>
            </div>
            <div class="feature">
                <h3>📊 课表视图</h3>
                <p>直观的周视图课程表，一目了然</p>
            </div>
        </div>
        
        <div class="download">
            <h3>下载应用</h3>
            <p>课程表管理系统 - 让学习更高效</p>
        </div>
        
        <div class="footer">
            <p>© 2024 课程表管理系统 | 版本 1.0.0</p>
        </div>
    </div>
</body>
</html>
